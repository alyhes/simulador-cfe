<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFESIM — Simulador de Capacitación CFE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--cfe-green:#00A651;--cfe-dark:#003B1F;--cfe-gold:#F5A623;
--danger:#E84040;--warn:#F5A623;--ok:#00C853;
--panel:#0A1A10;--panel2:#0F2218;--border:#1A4A2A;
--text:#C8E6C9;--text2:#81C784;--text3:#4CAF50
}
html,body{height:100%;overflow:hidden}
body{background:#061409;color:var(--text);font-family:'Rajdhani',sans-serif}
#app{display:grid;grid-template-rows:52px 1fr;height:100vh}
#header{background:var(--cfe-dark);border-bottom:2px solid var(--cfe-green);display:flex;align-items:center;padding:0 16px;gap:16px;z-index:10}
.logo{font-size:22px;font-weight:700;color:#fff;letter-spacing:3px}
.logo span{color:var(--cfe-green)}
.header-info{font-size:12px;color:var(--text2);font-family:'Share Tech Mono',monospace}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite;display:inline-block;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ml-auto{margin-left:auto;display:flex;gap:12px;align-items:center}
#main{display:grid;grid-template-columns:1fr 340px;overflow:hidden}
#scene-container{position:relative;background:#061409;overflow:hidden}
canvas{display:block}
#scene-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#fault-display{position:absolute;top:16px;left:16px;pointer-events:none}
.fault-badge{background:rgba(232,64,64,.9);border:1px solid #ff6b6b;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:600;color:#fff;margin-bottom:8px;animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.fault-badge.warn{background:rgba(245,166,35,.9);border-color:#ffc107}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.fault-icon{font-size:16px}
#minimap{position:absolute;bottom:16px;right:16px;width:140px;height:100px;background:rgba(0,30,15,.85);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.mm-title{font-size:9px;color:var(--text3);text-align:center;padding:3px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
#panel{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:var(--cfe-dark);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px 6px;font-size:11px;font-weight:600;letter-spacing:.5px;text-align:center;cursor:pointer;color:var(--text2);border:none;background:none;transition:.2s;text-transform:uppercase}
.tab.active{color:var(--cfe-green);border-bottom:2px solid var(--cfe-green)}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.05)}
.panel-content{flex:1;overflow-y:auto;padding:14px}
.panel-content::-webkit-scrollbar{width:4px}
.panel-content::-webkit-scrollbar-track{background:var(--panel)}
.panel-content::-webkit-scrollbar-thumb{background:var(--border)}
.section-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:'Share Tech Mono',monospace}
.scenario-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.scenario-card:hover{border-color:var(--cfe-green);background:rgba(0,166,81,.08)}
.scenario-card.active{border-color:var(--cfe-gold);background:rgba(245,166,35,.06)}
.scenario-card.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cfe-gold)}
.scenario-card.completed{border-color:var(--ok)}
.scenario-card.completed::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ok)}
.sc-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sc-icon{font-size:18px}
.sc-name{font-size:13px;font-weight:600;color:#fff}
.sc-diff{font-size:10px;padding:2px 6px;border-radius:3px;font-family:'Share Tech Mono',monospace}
.diff-easy{background:rgba(0,200,83,.15);color:var(--ok)}
.diff-med{background:rgba(245,166,35,.15);color:var(--warn)}
.diff-hard{background:rgba(232,64,64,.15);color:var(--danger)}
.sc-desc{font-size:11px;color:var(--text2);line-height:1.5}
.sc-status{font-size:10px;margin-top:4px;color:var(--text3)}
.action-section{margin-top:12px}
.action-btn{width:100%;padding:10px 14px;margin-bottom:6px;border-radius:6px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px;text-align:left}
.action-btn:hover{background:rgba(0,166,81,.12);border-color:var(--cfe-green);color:#fff}
.action-btn.correct{background:rgba(0,200,83,.15);border-color:var(--ok)}
.action-btn.wrong{background:rgba(232,64,64,.1);border-color:var(--danger)}
.action-btn:disabled{opacity:.4;cursor:not-allowed}
.btn-icon{font-size:16px;min-width:20px}
.btn-label{flex:1}
.big-btn{width:100%;padding:12px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:.2s;text-transform:uppercase}
.big-btn.start{background:var(--cfe-green);color:#fff}
.big-btn.start:hover{background:#00C853;transform:translateY(-1px)}
.big-btn.reset{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:6px}
.big-btn.reset:hover{border-color:var(--cfe-green);color:#fff}
.feedback-box{border-radius:8px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}
.feedback-box.ok{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:#A5D6A7}
.feedback-box.err{background:rgba(232,64,64,.1);border:1px solid rgba(232,64,64,.3);color:#EF9A9A}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0}
.progress-fill{height:100%;border-radius:2px;background:var(--cfe-green);transition:width .5s}
.timer-display{font-family:'Share Tech Mono',monospace;font-size:28px;color:#fff;text-align:center;padding:12px;background:var(--panel2);border-radius:8px;border:1px solid var(--border);margin-bottom:12px}
.timer-label{font-size:9px;color:var(--text3);letter-spacing:2px;display:block;text-align:center;margin-top:2px}
.step-list{margin:8px 0}
.step-item{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-family:'Share Tech Mono',monospace}
.step-num.done{background:var(--ok);color:#fff}
.step-num.active{background:var(--cfe-gold);color:#000;animation:pulse 1.5s infinite}
.step-text{font-size:11px;color:var(--text2);line-height:1.5;padding-top:2px}
.step-text.done{color:var(--text3);text-decoration:line-through;opacity:.7}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'Share Tech Mono',monospace}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.stat-val.green{color:var(--ok)}
.stat-val.gold{color:var(--cfe-gold)}
.stat-val.red{color:var(--danger)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:10px;color:var(--text2);width:90px;flex-shrink:0;font-family:'Share Tech Mono',monospace}
.bar-track{flex:1;height:14px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s}
.bar-pct{font-size:10px;color:var(--text3);width:28px;text-align:right;font-family:'Share Tech Mono',monospace}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.badge{font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(0,166,81,.1);border:1px solid rgba(0,166,81,.2);color:var(--text2)}
.badge.gold{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2);color:var(--cfe-gold)}
.badge.new{background:rgba(0,200,83,.15);border-color:rgba(0,200,83,.3);color:var(--ok)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">CFE<span>SIM</span></div>
    <div class="header-info"><span class="status-dot"></span>SISTEMA ACTIVO &nbsp;|&nbsp; MÓDULO: FALLAS ELÉCTRICAS v2.4</div>
    <div class="ml-auto">
      <div class="header-info">TÉC. OPERADOR</div>
      <div class="header-info" id="session-time">SESIÓN: 00:00</div>
    </div>
  </div>
  <div id="main">
    <div id="scene-container">
      <canvas id="glCanvas"></canvas>
      <div id="scene-overlay">
        <div id="fault-display"></div>
        <div id="minimap">
          <div class="mm-title">VISTA AÉREA</div>
          <canvas id="mmCanvas" width="140" height="84"></canvas>
        </div>
      </div>
    </div>
    <div id="panel">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('scenarios')">ESCENARIOS</button>
        <button class="tab" onclick="switchTab('action')">ACCIÓN</button>
        <button class="tab" onclick="switchTab('dashboard')">DASHBOARD</button>
      </div>
      <div class="panel-content" id="tab-scenarios">
        <div class="section-label">Selecciona un escenario</div>
        <div id="scenario-list"></div>
      </div>
      <div class="panel-content" id="tab-action" style="display:none">
        <div id="action-content"></div>
      </div>
      <div class="panel-content" id="tab-dashboard" style="display:none">
        <div id="dashboard-content"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SCENARIOS = [
  {
    id:'cortocircuito',name:'Cortocircuito en Línea',icon:'⚡',diff:'DIFÍCIL',diffClass:'hard',
    desc:'Cable fase A con cortocircuito a tierra. Fusibles activados. Requiere aislamiento inmediato.',
    faultColor:0xFF3333,faultPos:{x:-2,y:4,z:0},
    steps:['Identificar tramo afectado','Verificar indicadores de falla','Desconectar seccionador','Instalar puesta a tierra','Localizar punto de falla','Reparar y restaurar'],
    actions:[
      {id:'a1',label:'Verificar indicadores LED',icon:'🔍',correct:true,feedback:'✅ Correcto. Los LEDs confirman sobrecorriente en fase A.'},
      {id:'a2',label:'Trabajar directo sin aislar',icon:'🔧',correct:false,feedback:'❌ PELIGRO: Nunca trabajar en circuito energizado sin aislamiento.'},
      {id:'a3',label:'Desconectar seccionador',icon:'🔌',correct:true,feedback:'✅ Correcto. Seccionador abierto, circuito aislado.'},
      {id:'a4',label:'Instalar puesta a tierra',icon:'🌍',correct:true,feedback:'✅ Excelente. Tierra instalada = trabajo seguro.'},
      {id:'a5',label:'Medir resistencia del cable',icon:'📏',correct:true,feedback:'✅ Correcto. Resistencia 0Ω confirma cortocircuito.'},
    ],
    kpi:{dificultad:85,riesgo:'ALTO',tiempo:25}
  },
  {
    id:'transformador',name:'Transformador Sobrecalentado',icon:'🔥',diff:'MEDIO',diffClass:'med',
    desc:'Transformador de distribución con temperatura sobre 85°C. Posible falla de aislamiento.',
    faultColor:0xFF6600,faultPos:{x:0,y:2.5,z:0},
    steps:['Medir temperatura','Revisar nivel de aceite','Verificar carga conectada','Aliviar carga si es necesario','Notificar supervisión','Programar mantenimiento'],
    actions:[
      {id:'b1',label:'Medir temperatura con pirómetro',icon:'🌡️',correct:true,feedback:'✅ Lectura: 92°C. Supera límite de 85°C.'},
      {id:'b2',label:'Tocar el transformador',icon:'🤚',correct:false,feedback:'❌ PELIGRO: No tocar superficies calientes de equipos energizados.'},
      {id:'b3',label:'Revisar nivel de aceite dieléctrico',icon:'🔎',correct:true,feedback:'✅ Aceite en nivel mínimo. Posible causa del sobrecalentamiento.'},
      {id:'b4',label:'Transferir carga a otro circuito',icon:'↔️',correct:true,feedback:'✅ Carga reducida 40%. Temperatura bajando gradualmente.'},
      {id:'b5',label:'Notificar al supervisor',icon:'📞',correct:true,feedback:'✅ Supervisión notificada. Orden de mantenimiento generada.'},
    ],
    kpi:{dificultad:55,riesgo:'MEDIO',tiempo:18}
  },
  {
    id:'cable_danado',name:'Cable Dañado en Poste',icon:'⚠️',diff:'FÁCIL',diffClass:'easy',
    desc:'Conductor de media tensión con daño visible en el aislamiento. Zona peatonal cercana.',
    faultColor:0xFFCC00,faultPos:{x:2,y:5,z:-1},
    steps:['Delimitar zona de seguridad','Verificar distancias mínimas','Solicitar equipo de protección','Medir tensión residual','Reemplazar tramo dañado','Verificar aislamiento nuevo'],
    actions:[
      {id:'c1',label:'Delimitar área 10 metros',icon:'🚧',correct:true,feedback:'✅ Zona perimetral establecida. Peatones alejados.'},
      {id:'c2',label:'Trabajar desde el suelo',icon:'🪜',correct:false,feedback:'❌ Incorrecto. Se requiere plataforma aislada certificada.'},
      {id:'c3',label:'Usar guantes clase 4',icon:'🧤',correct:true,feedback:'✅ EPP correcto para MT. Guantes clase 4 = 36kV.'},
      {id:'c4',label:'Medir con multímetro clamp',icon:'⚡',correct:true,feedback:'✅ Tensión medida: 13.2kV. Sistema de 13.8kV nominales.'},
      {id:'c5',label:'Aplicar cinta vulcanizante',icon:'🔩',correct:true,feedback:'✅ Aislamiento restaurado. Prueba dieléctrica superada.'},
    ],
    kpi:{dificultad:35,riesgo:'MEDIO',tiempo:35}
  },
  {
    id:'sobrecarga',name:'Sobrecarga en Red',icon:'📊',diff:'DIFÍCIL',diffClass:'hard',
    desc:'Demanda pico supera capacidad nominal. Riesgo de falla en cascada. 3 circuitos afectados.',
    faultColor:0xFF0066,faultPos:{x:-1,y:3,z:1},
    steps:['Analizar lectura de SCADA','Identificar circuitos saturados','Calcular balance de cargas','Ejecutar transferencia','Monitorear estabilización','Documentar evento'],
    actions:[
      {id:'d1',label:'Revisar lecturas SCADA',icon:'💻',correct:true,feedback:'✅ SCADA muestra 118% de carga en alimentador norte.'},
      {id:'d2',label:'Ignorar alarmas automáticas',icon:'🔕',correct:false,feedback:'❌ Las alarmas indican situación crítica. Nunca ignorar.'},
      {id:'d3',label:'Abrir interruptor sobrecargado',icon:'⚙️',correct:true,feedback:'✅ Interruptor abierto. Carga transferida automáticamente.'},
      {id:'d4',label:'Balancear carga entre fases',icon:'⚖️',correct:true,feedback:'✅ Balance de fases mejorado. Desequilibrio < 5%.'},
      {id:'d5',label:'Generar reporte de evento',icon:'📋',correct:true,feedback:'✅ Reporte generado. Datos guardados para análisis.'},
    ],
    kpi:{dificultad:90,riesgo:'CRÍTICO',tiempo:15}
  }
];

const STATE = {
  tab:'scenarios',activeScenario:null,phase:'idle',
  timer:0,timerInterval:null,sessionTimer:0,sessionInterval:null,
  completedSteps:0,actionsHistory:[],faultObjects:[],
  stats:{
    totalSessions:7,correctDecisions:31,wrongDecisions:4,avgTime:22,
    byScenario:{
      cortocircuito:{attempts:3,bestTime:18,accuracy:87},
      transformador:{attempts:2,bestTime:14,accuracy:95},
      cable_danado:{attempts:1,bestTime:35,accuracy:100},
      sobrecarga:{attempts:1,bestTime:20,accuracy:60}
    }
  }
};

let renderer,scene,camera,camAngle=0,camRadius=18;
const canvas=document.getElementById('glCanvas');

function initThree(){
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x061409);
  scene.fog=new THREE.Fog(0x061409,20,60);
  camera=new THREE.PerspectiveCamera(55,1,0.1,100);
  camera.position.set(8,10,14);
  camera.lookAt(0,2,0);
  buildScene();addLights();resizeRenderer();animate();
}

function buildScene(){
  scene.add(new THREE.GridHelper(30,30,0x1A4A2A,0x0D2A16));
  const g=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshLambertMaterial({color:0x071810}));
  g.rotation.x=-Math.PI/2;g.position.y=-0.01;g.receiveShadow=true;scene.add(g);
  [[-3,0,-2],[0,0,-2],[3,0,-2],[-3,0,2],[0,0,2],[3,0,2]].forEach(([x,,z])=>makePole(x,z));
  makeWires();makeTransformer(0,0);
  const road=new THREE.Mesh(new THREE.PlaneGeometry(2,28),new THREE.MeshLambertMaterial({color:0x0A1F0A}));
  road.rotation.x=-Math.PI/2;road.position.set(-5,0.005,0);scene.add(road);
  [[5,0,3],[7,0,0],[5,0,-3],[-6,0,3],[-6,0,-3]].forEach(([x,,z])=>makeBuilding(x,z));
}

function makePole(x,z){
  const g=new THREE.Group();
  const pMat=new THREE.MeshLambertMaterial({color:0x3A2A1A});
  const p=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,7,8),pMat);
  p.position.y=3.5;p.castShadow=true;g.add(p);
  const arm=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.08,0.08),pMat);
  arm.position.y=6.5;g.add(arm);
  [-0.9,0,0.9].forEach(ox=>{
    const ins=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.3,6),new THREE.MeshLambertMaterial({color:0xB87333}));
    ins.position.set(ox,6.7,0);g.add(ins);
  });
  g.position.set(x,0,z);scene.add(g);
}

function makeWires(){
  const mat=new THREE.LineBasicMaterial({color:0x888888});
  [-2,2].forEach(z=>{
    [-0.9,0,0.9].forEach(()=>{
      const pts=[new THREE.Vector3(-3,6.7,z),new THREE.Vector3(0,6.7,z),new THREE.Vector3(3,6.7,z)];
      scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
    });
  });
}

function makeTransformer(x,z){
  const tg=new THREE.Group();
  const bMat=new THREE.MeshLambertMaterial({color:0x1A3A2A});
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.2,0.8),bMat);
  body.position.y=2.8;body.castShadow=true;tg.add(body);
  for(let i=0;i<4;i++){
    const fin=new THREE.Mesh(new THREE.BoxGeometry(0.05,1.0,0.6),new THREE.MeshLambertMaterial({color:0x2A4A3A}));
    fin.position.set(-0.5+i*0.33,2.8,0);tg.add(fin);
  }
  [[-0.2,3.5,-0.15],[0,3.5,-0.15],[0.2,3.5,-0.15]].forEach(([bx,by,bz])=>{
    const bs=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.3,6),new THREE.MeshLambertMaterial({color:0xCCBB88}));
    bs.position.set(bx,by,bz);tg.add(bs);
  });
  tg.position.set(x,3,z);scene.add(tg);
}

function makeBuilding(x,z){
  const h=2+Math.random()*3,w=1.5+Math.random();
  const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(0.35,0.2,0.08+Math.random()*0.05)}));
  b.position.set(x,h/2,z);b.castShadow=true;scene.add(b);
}

function addLights(){
  scene.add(new THREE.AmbientLight(0x002200,0.8));
  const dir=new THREE.DirectionalLight(0x00FF44,0.4);
  dir.position.set(10,20,10);dir.castShadow=true;scene.add(dir);
  [-3,0,3].forEach(x=>{const sl=new THREE.PointLight(0x00FF66,0.3,8);sl.position.set(x,7,0);scene.add(sl);});
}

function resizeRenderer(){
  const c=canvas.parentElement,w=c.clientWidth,h=c.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;camera.updateProjectionMatrix();
}

function animate(){
  requestAnimationFrame(animate);
  camAngle+=0.003;
  camera.position.x=Math.sin(camAngle)*camRadius;
  camera.position.z=Math.cos(camAngle)*camRadius;
  camera.lookAt(0,3,0);
  STATE.faultObjects.forEach((obj,i)=>{
    if(obj.userData.pulse)obj.material.opacity=0.4+Math.sin(Date.now()*0.005+i)*0.4;
  });
  renderer.render(scene,camera);
  drawMinimap();
}

window.addEventListener('resize',resizeRenderer);

function showFaultInScene(s){
  clearFaultObjects();
  if(!s)return;
  const fp=s.faultPos;
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16),new THREE.MeshBasicMaterial({color:s.faultColor,transparent:true,opacity:0.7}));
  sphere.position.set(fp.x,fp.y,fp.z);sphere.userData.pulse=true;
  scene.add(sphere);STATE.faultObjects.push(sphere);
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.6,0.75,32),new THREE.MeshBasicMaterial({color:s.faultColor,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
  ring.position.set(fp.x,fp.y,fp.z);ring.rotation.x=-Math.PI/2;ring.userData.pulse=true;
  scene.add(ring);STATE.faultObjects.push(ring);
  camRadius=14;
}

function clearFaultObjects(){STATE.faultObjects.forEach(o=>scene.remove(o));STATE.faultObjects=[];camRadius=18;}

const mmCtx=document.getElementById('mmCanvas').getContext('2d');
function drawMinimap(){
  mmCtx.clearRect(0,0,140,84);
  mmCtx.fillStyle='#061409';mmCtx.fillRect(0,0,140,84);
  mmCtx.strokeStyle='#1A4A2A';mmCtx.lineWidth=.5;
  for(let i=0;i<140;i+=14){mmCtx.beginPath();mmCtx.moveTo(i,0);mmCtx.lineTo(i,84);mmCtx.stroke();}
  for(let i=0;i<84;i+=14){mmCtx.beginPath();mmCtx.moveTo(0,i);mmCtx.lineTo(140,i);mmCtx.stroke();}
  const cx=70,cy=42,sc=5;
  [[-3,-2],[0,-2],[3,-2],[-3,2],[0,2],[3,2]].forEach(([x,z])=>{
    mmCtx.fillStyle='#2A6A3A';mmCtx.beginPath();mmCtx.arc(cx+x*sc,cy+z*sc,3,0,Math.PI*2);mmCtx.fill();
  });
  mmCtx.fillStyle='#00A651';mmCtx.fillRect(cx-4,cy-4,8,8);
  if(STATE.activeScenario){
    const fp=STATE.activeScenario.faultPos;
    mmCtx.fillStyle='#ff4444';
    mmCtx.globalAlpha=0.5+Math.sin(Date.now()*.008)*.3;
    mmCtx.beginPath();mmCtx.arc(cx+fp.x*sc,cy+fp.z*sc,5,0,Math.PI*2);mmCtx.fill();
    mmCtx.globalAlpha=1;
  }
  mmCtx.strokeStyle='#00FF66';mmCtx.lineWidth=1;
  const cx2=Math.min(Math.max(cx+Math.sin(camAngle)*6,4),136);
  const cz2=Math.min(Math.max(cy+Math.cos(camAngle)*6,4),80);
  mmCtx.beginPath();mmCtx.arc(cx2,cz2,3,0,Math.PI*2);mmCtx.stroke();
}

function showFaultBadges(s){
  const el=document.getElementById('fault-display');
  if(!s){el.innerHTML='';return;}
  const r=s.kpi.riesgo,rClass=(r==='CRÍTICO'||r==='ALTO')?'':'warn';
  el.innerHTML=`<div class="fault-badge ${rClass}"><span class="fault-icon">⚠️</span>FALLA ACTIVA: ${s.name.toUpperCase()}</div>
  <div class="fault-badge warn"><span class="fault-icon">🔴</span>RIESGO ${r} — INTERVENCIÓN REQUERIDA</div>`;
}

function switchTab(tab){
  STATE.tab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['scenarios','action','dashboard'][i]===tab));
  document.getElementById('tab-scenarios').style.display=tab==='scenarios'?'block':'none';
  document.getElementById('tab-action').style.display=tab==='action'?'block':'none';
  document.getElementById('tab-dashboard').style.display=tab==='dashboard'?'block':'none';
  if(tab==='dashboard')renderDashboard();
}

function renderScenarioList(){
  document.getElementById('scenario-list').innerHTML=SCENARIOS.map(s=>{
    const st=STATE.stats.byScenario[s.id],done=st&&st.attempts>0;
    return `<div class="scenario-card ${STATE.activeScenario?.id===s.id?'active':''} ${done?'completed':''}" onclick="selectScenario('${s.id}')">
      <div class="sc-header"><span class="sc-icon">${s.icon}</span><span class="sc-name">${s.name}</span><span class="sc-diff diff-${s.diffClass}">${s.diff}</span></div>
      <div class="sc-desc">${s.desc}</div>
      <div class="sc-status">${done?`✅ ${st.attempts}x — Mejor: ${st.bestTime}min — ${st.accuracy}% precisión`:'⬜ Sin intentar'}</div>
    </div>`;
  }).join('');
}

function selectScenario(id){
  const s=SCENARIOS.find(x=>x.id===id);if(!s)return;
  STATE.activeScenario=s;STATE.phase='briefing';STATE.actionsHistory=[];STATE.completedSteps=0;
  renderScenarioList();showFaultInScene(s);showFaultBadges(s);switchTab('action');renderActionPanel();
}

function renderActionPanel(){
  const el=document.getElementById('action-content'),s=STATE.activeScenario;
  if(!s){el.innerHTML='<p style="color:var(--text3);font-size:12px;text-align:center;margin-top:40px">Selecciona un escenario primero</p>';return;}

  if(STATE.phase==='briefing'){
    el.innerHTML=`<div class="section-label">Escenario Activo</div>
    <div style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
      <div style="font-size:22px;margin-bottom:6px">${s.icon}</div>
      <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px">${s.name}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px">${s.desc}</div>
      <div style="display:flex;gap:8px;font-size:11px">
        <span style="background:rgba(0,0,0,.3);padding:4px 8px;border-radius:4px;color:var(--cfe-gold)">⏱ ${s.kpi.tiempo} min</span>
        <span style="background:rgba(0,0,0,.3);padding:4px 8px;border-radius:4px;color:var(--danger)">🔴 ${s.kpi.riesgo}</span>
        <span style="background:rgba(0,0,0,.3);padding:4px 8px;border-radius:4px;color:var(--text2)">📊 ${s.kpi.dificultad}%</span>
      </div>
    </div>
    <div class="section-label">Procedimiento</div>
    <div class="step-list">${s.steps.map((st,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${st}</div></div>`).join('')}</div>
    <div style="margin-top:14px"><button class="big-btn start" onclick="startScenario()">▶ INICIAR SIMULACIÓN</button></div>`;
  }
  else if(STATE.phase==='active'){
    const done=STATE.actionsHistory.length,total=s.actions.length,pct=Math.round(done/total*100);
    const last=STATE.actionsHistory[STATE.actionsHistory.length-1];
    el.innerHTML=`<div class="timer-display">${formatTime(STATE.timer)}<span class="timer-label">TIEMPO TRANSCURRIDO</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:10px;color:var(--text3);text-align:right;margin-bottom:10px;font-family:'Share Tech Mono',monospace">${done}/${total} ACCIONES</div>
    <div class="section-label">Pasos del procedimiento</div>
    <div class="step-list" style="margin-bottom:12px">${s.steps.map((st,i)=>{
      const cls=i<STATE.completedSteps?'done':i===STATE.completedSteps?'active':'';
      return `<div class="step-item"><div class="step-num ${cls}">${cls==='done'?'✓':i+1}</div><div class="step-text ${cls}">${st}</div></div>`;
    }).join('')}</div>
    <div class="section-label">Acciones disponibles</div>
    <div class="action-section">${s.actions.map(a=>{
      const taken=STATE.actionsHistory.find(h=>h.id===a.id);
      return `<button class="action-btn ${taken?(taken.correct?'correct':'wrong'):''}" onclick="takeAction('${a.id}')" ${taken?'disabled':''}>
        <span class="btn-icon">${a.icon}</span><span class="btn-label">${a.label}</span>
        ${taken?(taken.correct?'<span style="color:var(--ok)">✓</span>':'<span style="color:var(--danger)">✗</span>'):''}
      </button>`;
    }).join('')}</div>
    ${last?`<div class="section-label" style="margin-top:12px">Retroalimentación</div><div class="feedback-box ${last.correct?'ok':'err'}">${last.feedback}</div>`:''}
    ${done>=total?`<button class="big-btn start" onclick="evaluateScenario()" style="margin-top:8px">📊 VER EVALUACIÓN</button>`:''}`;
  }
  else if(STATE.phase==='evaluation'){
    const correct=STATE.actionsHistory.filter(h=>h.correct).length,score=Math.round(correct/s.actions.length*100);
    el.innerHTML=`<div class="section-label">Evaluación Final</div>
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:48px;font-weight:700;font-family:'Share Tech Mono',monospace;color:${score>=80?'var(--ok)':score>=60?'var(--cfe-gold)':'var(--danger)'}">${score}%</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${score>=80?'✅ APROBADO':'❌ REQUIERE PRÁCTICA'}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val green">${correct}/${s.actions.length}</div><div class="stat-lbl">Decisiones</div></div>
      <div class="stat-card"><div class="stat-val gold">${formatTime(STATE.timer)}</div><div class="stat-lbl">Tiempo</div></div>
    </div>
    <div class="section-label">Detalle de Acciones</div>
    ${STATE.actionsHistory.map(h=>`<div class="feedback-box ${h.correct?'ok':'err'}" style="margin-bottom:6px">${h.icon} ${h.label}: ${h.feedback}</div>`).join('')}
    <button class="big-btn start" onclick="selectScenario('${s.id}')" style="margin-top:12px">↺ REINTENTAR</button>
    <button class="big-btn reset" onclick="backToScenarios()">← SELECCIONAR ESCENARIO</button>`;
  }
}

function startScenario(){
  STATE.phase='active';STATE.timer=0;STATE.actionsHistory=[];STATE.completedSteps=0;
  clearInterval(STATE.timerInterval);
  STATE.timerInterval=setInterval(()=>{STATE.timer++;if(STATE.phase==='active')renderActionPanel();},1000);
  renderActionPanel();
}

function takeAction(id){
  const s=STATE.activeScenario,a=s.actions.find(x=>x.id===id);if(!a)return;
  STATE.actionsHistory.push({...a});
  if(a.correct)STATE.completedSteps=Math.min(STATE.completedSteps+1,s.steps.length);
  renderActionPanel();
}

function evaluateScenario(){
  clearInterval(STATE.timerInterval);STATE.phase='evaluation';
  const s=STATE.activeScenario,score=Math.round(STATE.actionsHistory.filter(h=>h.correct).length/s.actions.length*100);
  const st=STATE.stats.byScenario[s.id];st.attempts++;
  const mins=Math.ceil(STATE.timer/60);
  if(!st.bestTime||mins<st.bestTime)st.bestTime=mins;
  st.accuracy=Math.round((st.accuracy*(st.attempts-1)+score)/st.attempts);
  STATE.stats.correctDecisions+=STATE.actionsHistory.filter(h=>h.correct).length;
  STATE.stats.wrongDecisions+=STATE.actionsHistory.filter(h=>!h.correct).length;
  STATE.stats.totalSessions++;
  clearFaultObjects();showFaultBadges(null);renderActionPanel();
}

function backToScenarios(){
  STATE.phase='idle';STATE.activeScenario=null;
  clearInterval(STATE.timerInterval);clearFaultObjects();showFaultBadges(null);
  switchTab('scenarios');renderScenarioList();
}

function formatTime(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

function renderDashboard(){
  const st=STATE.stats,total=st.correctDecisions+st.wrongDecisions,globalAcc=total>0?Math.round(st.correctDecisions/total*100):0;
  document.getElementById('dashboard-content').innerHTML=`
  <div class="section-label">Desempeño General</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val green">${st.totalSessions}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-card"><div class="stat-val gold">${globalAcc}%</div><div class="stat-lbl">Precisión</div></div>
    <div class="stat-card"><div class="stat-val green">${st.correctDecisions}</div><div class="stat-lbl">Correctas</div></div>
    <div class="stat-card"><div class="stat-val red">${st.wrongDecisions}</div><div class="stat-lbl">Errores</div></div>
  </div>
  <div class="divider"></div>
  <div class="section-label">Precisión por Escenario</div>
  ${SCENARIOS.map(s=>{const sd=st.byScenario[s.id],acc=sd.accuracy;
    return`<div class="bar-row"><div class="bar-label">${s.icon} ${s.name.split(' ')[0]}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${acc}%;background:${acc>=80?'var(--ok)':acc>=60?'var(--cfe-gold)':'var(--danger)'}"></div></div>
    <div class="bar-pct">${acc}%</div></div>`;}).join('')}
  <div class="divider"></div>
  <div class="section-label">Historial</div>
  ${SCENARIOS.map(s=>{const sd=st.byScenario[s.id];
    return`<div style="background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
    <div style="font-size:20px">${s.icon}</div>
    <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#fff">${s.name}</div>
    <div style="font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace">${sd.attempts>0?`${sd.attempts} intento(s) · Mejor: ${sd.bestTime}min · ${sd.accuracy}%`:'Sin intentar'}</div></div>
    <div style="font-size:11px;color:${sd.accuracy>=80?'var(--ok)':sd.accuracy>=60?'var(--cfe-gold)':'var(--text3)'}">${sd.accuracy>=80?'✅':sd.accuracy>=60?'⚠️':sd.attempts>0?'❌':'—'}</div>
  </div>`;}).join('')}
  <div class="divider"></div>
  <div class="section-label">Insignias</div>
  <div class="badge-row">
    <div class="badge new">⚡ Primer Intento</div><div class="badge gold">🏆 Técnico Seguro</div>
    <div class="badge">🔧 Electricista Jr</div>${st.totalSessions>=10?'<div class="badge new">⭐ 10 Sesiones</div>':''}
  </div><div style="height:16px"></div>`;
}

STATE.sessionInterval=setInterval(()=>{
  STATE.sessionTimer++;
  document.getElementById('session-time').textContent=`SESIÓN: ${formatTime(STATE.sessionTimer)}`;
},1000);

initThree();
renderScenarioList();
</script>
</body>
</html>
